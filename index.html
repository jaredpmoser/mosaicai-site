<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mosaic AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero {
      text-align: center;
      padding: 2rem;
    }
    .logo {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }
    .tagline {
      font-size: 1.25rem;
      color: #9ca3af;
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .badge {
      display: inline-block;
      padding: 0.5rem 1.25rem;
      border: 1px solid #374151;
      border-radius: 9999px;
      font-size: 0.875rem;
      color: #6b7280;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="logo">Mosaic AI</div>
    <p class="tagline">Building intelligent systems, piece by piece.</p>
    <span class="badge">Coming soon &mdash; mosaicai.io</span>
  </div>
</body>
</html>
